---
# =============================================================================
# XFCE Desktop Environment Playbook
# =============================================================================
# This playbook installs and configures a full XFCE desktop environment that
# runs inside a Xephyr window (a nested X server). This means the entire DE
# appears as a normal app window on the host display, fully isolated from the
# host's own window manager.
#
# Architecture:
#   - Xephyr opens a resizable window on the host display
#   - All XFCE components run inside that virtual display
#   - Apps launched from within the DE stay contained inside Xephyr
#   - Closing the Xephyr window kills the DE and all its children
#   - A clipboard bridge syncs CLIPBOARD and PRIMARY between host and Xephyr
#
# Tags:
#   build   — run once at image build time to install packages and scripts
#   startup — run every container start, after the USB volume is mounted
#
# Why the split matters:
#   /data is a USB volume mounted at runtime, not available during build.
#   Anything that needs to land on /data must go in the startup tag.
#   Anything that only touches the image filesystem goes in build.
#
# The Desktop app is launched on demand via the Python launcher (singleton).
# When the user closes the Xephyr window, the DE and all its children exit,
# which the launcher detects to reset the singleton state.
# =============================================================================

- name: Install XFCE Desktop Environment
  hosts: localhost
  connection: local
  tags: build
  tasks:

    # -------------------------------------------------------------------------
    # PACKAGES
    # -------------------------------------------------------------------------
    # All packages installed from apt — no external downloads needed.
    # -------------------------------------------------------------------------
    - name: Install XFCE core components and dependencies
      apt:
        name:
          # --- Nested X server ---
          # Xephyr renders a fully independent X server as a window on the
          # host display. This is what allows the DE to appear as a normal
          # app window without conflicting with the host window manager.
          - xserver-xephyr

          # --- XFCE core ---
          # xfwm4: window manager — handles window decorations, focus,
          # tiling and keyboard shortcuts inside the Xephyr display.
          - xfwm4

          # xfce4-panel: taskbar hosting the app menu, clock, system tray,
          # and panel plugins.
          - xfce4-panel

          # xfdesktop4: renders the desktop background inside Xephyr.
          - xfdesktop4

          # xfce4-session: session manager, handles logout/restart from the DE.
          - xfce4-session

          # xfce4-settings + xfsettingsd: settings manager GUI and the daemon
          # that reads xfconfd values and applies GTK theme, icons, and fonts
          # to all running applications. Without xfsettingsd the theme config
          # is stored but never applied to the UI.
          - xfce4-settings

          # xfconf: XFCE configuration storage. xfconfd stores settings in
          # XML channel files under XDG_CONFIG_HOME/xfce4/xfconf/xfce-perchannel-xml/
          # and exposes them via D-Bus to all XFCE components.
          - xfconf

          # --- Applications ---
          # Thunar: lightweight file manager, integrates with xfdesktop.
          - thunar

          # xfce4-terminal: terminal emulator that respects XFCE theme and
          # XDG config paths for persistence on the USB volume.
          - xfce4-terminal

          # --- Panel plugins ---
          # Whisker menu: modern searchable app launcher, replaces default menu.
          - xfce4-whiskermenu-plugin

          # PulseAudio plugin: volume control in the system tray.
          - xfce4-pulseaudio-plugin

          # Clipman: clipboard history manager in the system tray.
          - xfce4-clipman-plugin

          # --- Theme ---
          # Materia: Material Design inspired GTK theme. We use the
          # Materia-dark-compact variant — dark background, reduced padding.
          - materia-gtk-theme

          # Papirus: modern flat icon set with wide app coverage.
          # We use Papirus-Dark to match the dark theme.
          - papirus-icon-theme

          # --- Clipboard bridge dependency ---
          # xclip: reads and writes X11 clipboard selections from the shell.
          # Used by clipboard-bridge.sh to sync CLIPBOARD and PRIMARY
          # selections between the host display and the Xephyr display.
          - xclip

          # --- Fonts ---
          # Noto provides consistent rendering across scripts and includes emoji.
          # Set as the default UI and monospace font in xsettings.xml.
          - fonts-noto
          - fonts-noto-color-emoji
        state: present
        update_cache: yes

    # -------------------------------------------------------------------------
    # CLIPBOARD BRIDGE SCRIPT
    # -------------------------------------------------------------------------
    # X11 has two independent clipboard mechanisms:
    #   CLIPBOARD — explicit copy/paste (Ctrl+C / Ctrl+V)
    #   PRIMARY   — implicit selection/paste (mouse select / middle-click)
    #
    # Xephyr runs a separate X server so by default its clipboard is invisible
    # to the host and vice versa. This script polls both displays every 500ms
    # and syncs whichever selection changed last, in both directions.
    #
    # Key design decisions:
    #   - timeout 0.2 on every xclip read prevents hanging when no app owns
    #     the selection (xclip errors with "target STRING not available")
    #   - env DISPLAY=... syntax required because `timeout` does not support
    #     inline VAR=value syntax (it tries to run "DISPLAY=:1" as a command)
    #   - XAUTHORITY passed explicitly so xclip can authenticate with the
    #     host X server (needed when the host uses gdm or a display manager)
    #   - Four separate state variables prevent ping-pong loops where a sync
    #     on one side immediately triggers a re-sync on the other
    # -------------------------------------------------------------------------
    - name: Install clipboard bridge script
      copy:
        dest: /opt/launcher/scripts/clipboard-bridge.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # clipboard-bridge.sh — bidirectional clipboard sync between two X displays
          #
          # Arguments:
          #   $1  HOST_DISPLAY     — the host X display (e.g. :1)
          #   $2  HOST_XAUTHORITY  — path to the host Xauthority cookie file,
          #                          needed to authenticate with the host X server
          #   $3  XEPHYR_DISPLAY   — the Xephyr virtual display (e.g. :99)
          #
          # Syncs both CLIPBOARD (Ctrl+C/V) and PRIMARY (mouse select/middle-click).
          # Runs as a background daemon, exits when killed by start-desktop.sh.

          HOST_DISPLAY=$1
          HOST_XAUTHORITY=$2
          XEPHYR_DISPLAY=$3

          # Last known values for each selection on each display.
          # Compared on every poll to detect changes and avoid ping-pong loops.
          LAST_HOST_CLIP=""
          LAST_XEPHYR_CLIP=""
          LAST_HOST_PRIMARY=""
          LAST_XEPHYR_PRIMARY=""

          while true; do

            # -----------------------------------------------------------------
            # CLIPBOARD selection (Ctrl+C / Ctrl+V)
            # -----------------------------------------------------------------
            HOST_CLIP=$(timeout 0.2 env DISPLAY=${HOST_DISPLAY} XAUTHORITY=${HOST_XAUTHORITY} xclip -o -selection clipboard 2>/dev/null || echo "")
            XEPHYR_CLIP=$(timeout 0.2 env DISPLAY=${XEPHYR_DISPLAY} xclip -o -selection clipboard 2>/dev/null || echo "")

            # Host -> Xephyr: push if host value changed and differs from Xephyr
            if [ "${HOST_CLIP}" != "${LAST_HOST_CLIP}" ] && [ "${HOST_CLIP}" != "${XEPHYR_CLIP}" ]; then
              echo -n "${HOST_CLIP}" | env DISPLAY=${XEPHYR_DISPLAY} xclip -i -selection clipboard 2>/dev/null
              LAST_HOST_CLIP="${HOST_CLIP}"
              LAST_XEPHYR_CLIP="${HOST_CLIP}"
            fi

            # Xephyr -> Host: push if Xephyr value changed and differs from host
            if [ "${XEPHYR_CLIP}" != "${LAST_XEPHYR_CLIP}" ] && [ "${XEPHYR_CLIP}" != "${HOST_CLIP}" ]; then
              echo -n "${XEPHYR_CLIP}" | env DISPLAY=${HOST_DISPLAY} XAUTHORITY=${HOST_XAUTHORITY} xclip -i -selection clipboard 2>/dev/null
              LAST_XEPHYR_CLIP="${XEPHYR_CLIP}"
              LAST_HOST_CLIP="${XEPHYR_CLIP}"
            fi

            # -----------------------------------------------------------------
            # PRIMARY selection (mouse highlight / middle-click paste)
            # -----------------------------------------------------------------
            # Tracked independently — PRIMARY and CLIPBOARD are separate
            # X11 buffers and must never overwrite each other.
            HOST_PRIMARY=$(timeout 0.2 env DISPLAY=${HOST_DISPLAY} XAUTHORITY=${HOST_XAUTHORITY} xclip -o -selection primary 2>/dev/null || echo "")
            XEPHYR_PRIMARY=$(timeout 0.2 env DISPLAY=${XEPHYR_DISPLAY} xclip -o -selection primary 2>/dev/null || echo "")

            # Host -> Xephyr
            if [ "${HOST_PRIMARY}" != "${LAST_HOST_PRIMARY}" ] && [ "${HOST_PRIMARY}" != "${XEPHYR_PRIMARY}" ]; then
              echo -n "${HOST_PRIMARY}" | env DISPLAY=${XEPHYR_DISPLAY} xclip -i -selection primary 2>/dev/null
              LAST_HOST_PRIMARY="${HOST_PRIMARY}"
              LAST_XEPHYR_PRIMARY="${HOST_PRIMARY}"
            fi

            # Xephyr -> Host
            if [ "${XEPHYR_PRIMARY}" != "${LAST_XEPHYR_PRIMARY}" ] && [ "${XEPHYR_PRIMARY}" != "${HOST_PRIMARY}" ]; then
              echo -n "${XEPHYR_PRIMARY}" | env DISPLAY=${HOST_DISPLAY} XAUTHORITY=${HOST_XAUTHORITY} xclip -i -selection primary 2>/dev/null
              LAST_XEPHYR_PRIMARY="${XEPHYR_PRIMARY}"
              LAST_HOST_PRIMARY="${XEPHYR_PRIMARY}"
            fi

            # Poll every 500ms — fast enough to feel instant, light on CPU
            sleep 0.5
          done

    # -------------------------------------------------------------------------
    # STARTUP WRAPPER SCRIPT
    # -------------------------------------------------------------------------
    # Entry point called by the Python launcher when the user clicks "Desktop".
    #
    # Startup sequence:
    #   1. Capture host display info before overriding DISPLAY for Xephyr
    #   2. Find a free X display number (starting from :99)
    #   3. Start Xephyr as a resizable window on the host display
    #   4. Export DISPLAY to point all child processes at Xephyr
    #   5. Start xfwm4 (window manager) first — must be ready before others
    #   6. Start xfdesktop and xfce4-panel
    #   7. Start xfsettingsd — applies GTK theme/icons from xfconfd to all apps
    #   8. Start clipboard bridge as a background daemon
    #   9. Wait for Xephyr window to close (user exits the DE)
    #  10. Clean up all child processes
    # -------------------------------------------------------------------------
    - name: Install XFCE startup wrapper script
      copy:
        dest: /opt/launcher/scripts/start-desktop.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # start-desktop.sh — launches XFCE inside a Xephyr window.
          # Called by the Python launcher as the Desktop app entry point.

          # -----------------------------------------------------------------
          # Capture host display info BEFORE overriding DISPLAY for Xephyr.
          # HOST_DISPLAY and HOST_XAUTHORITY are injected by the Makefile via:
          #   COMMON_ENV := ... HOST_DISPLAY=$(DISPLAY) HOST_XAUTHORITY=$(XAUTHORITY)
          # Falling back to $DISPLAY/$XAUTHORITY handles cases where they are
          # not explicitly set but inherited from the environment.
          # -----------------------------------------------------------------
          HOST_DISPLAY=${HOST_DISPLAY:-$DISPLAY}
          HOST_XAUTHORITY=${HOST_XAUTHORITY:-$XAUTHORITY}

          # Tell XFCE where to store config and data.
          # /data is on the USB volume so settings persist across machines.
          export XDG_CONFIG_HOME=/data/desktop/config
          export XDG_DATA_HOME=/data/desktop/local/share

          # -----------------------------------------------------------------
          # Find a free display number for Xephyr.
          # Xorg creates a lock file at /tmp/.X<N>-lock for each active display.
          # We start at :99 and increment until we find a free slot.
          # -----------------------------------------------------------------
          DISPLAY_NUM=99
          while [ -f /tmp/.X${DISPLAY_NUM}-lock ]; do
            DISPLAY_NUM=$((DISPLAY_NUM + 1))
          done
          XEPHYR_DISPLAY=":${DISPLAY_NUM}"

          # -----------------------------------------------------------------
          # Start Xephyr — nested X server rendered as a window on the host.
          #
          # Flags:
          #   -resizeable     allow the user to resize the Xephyr window
          #   -no-host-grab   prevent Xephyr from capturing host shortcuts
          #                   (e.g. Ctrl+Alt+F2 stays on the host)
          #   -title          window title shown in the host taskbar
          #   -screen         initial virtual display resolution
          # -----------------------------------------------------------------
          Xephyr \
            -resizeable \
            -no-host-grab \
            -title "Desktop" \
            -screen 1280x800 \
            ${XEPHYR_DISPLAY} &
          XEPHYR_PID=$!

          # Give Xephyr time to initialise before connecting X clients
          sleep 1

          # -----------------------------------------------------------------
          # Point all subsequent child processes at the Xephyr display.
          # Exporting DISPLAY here means xfwm4, xfdesktop, xfce4-panel and
          # every app launched from within the DE all connect to Xephyr,
          # never to the host display.
          # -----------------------------------------------------------------
          export DISPLAY=${XEPHYR_DISPLAY}

          # -----------------------------------------------------------------
          # Start XFCE components in the correct order.
          # xfwm4 must be first — it must be ready to manage windows before
          # xfdesktop and xfce4-panel try to create their own windows.
          # -----------------------------------------------------------------

          # Window manager — compositor off to avoid artifacts inside Xephyr
          xfwm4 --compositor=off &

          # Wait for xfwm4 to register with the X server before proceeding
          sleep 1

          # Desktop background renderer
          xfdesktop &

          # Taskbar with app menu, clock, system tray and plugins
          xfce4-panel &

          # Settings daemon — MUST be started after xfconfd has initialised.
          # xfsettingsd reads the theme/icon/font values from xfconfd and
          # applies them to all running GTK applications. Without it, xfconf
          # stores the config but the UI never reflects the changes.
          xfsettingsd &

          # -----------------------------------------------------------------
          # Start clipboard bridge.
          # Passes host display, host Xauthority, and Xephyr display so the
          # bridge can authenticate with both X servers independently.
          # -----------------------------------------------------------------
          /opt/launcher/scripts/clipboard-bridge.sh "${HOST_DISPLAY}" "${HOST_XAUTHORITY}" "${XEPHYR_DISPLAY}" &
          BRIDGE_PID=$!

          # -----------------------------------------------------------------
          # Wait for Xephyr to exit.
          # Blocks until the user closes the Xephyr window. The launcher
          # detects this script exiting and resets the Desktop singleton.
          # -----------------------------------------------------------------
          wait $XEPHYR_PID

          # -----------------------------------------------------------------
          # Cleanup — kill all processes started by this script.
          # -----------------------------------------------------------------

          # Stop the clipboard bridge daemon
          kill ${BRIDGE_PID} 2>/dev/null

          # Ask xfce4-panel to quit gracefully before force-killing
          env DISPLAY=${XEPHYR_DISPLAY} xfce4-panel --quit 2>/dev/null

          # Force-kill any remaining processes still attached to the Xephyr display
          kill $(pgrep -f "DISPLAY=${XEPHYR_DISPLAY}") 2>/dev/null

    # -------------------------------------------------------------------------
    # LAUNCHER REGISTRATION
    # -------------------------------------------------------------------------
    # Drops a JSON descriptor into /opt/launcher/apps/ so the Python launcher
    # shows a "Desktop" card in the UI. The launcher enforces singleton
    # behaviour — only one instance of start-desktop.sh runs at a time.
    # -------------------------------------------------------------------------
    - name: Register Desktop with launcher
      copy:
        dest: /opt/launcher/apps/desktop.json
        content: |
          {
            "name": "Desktop",
            "cmd": ["/opt/launcher/scripts/start-desktop.sh"],
            "color": "#455A64",
            "icon": "desktop"
          }

- name: Setup Desktop at startup
  hosts: localhost
  connection: local
  tags: startup
  tasks:

    # -------------------------------------------------------------------------
    # DIRECTORY STRUCTURE
    # -------------------------------------------------------------------------
    # /data is a USB volume mount — it may not exist at build time and may be
    # freshly formatted on a new machine. We recreate the full directory tree
    # on every startup to guarantee the DE can always write its config.
    # -------------------------------------------------------------------------
    - name: Ensure desktop data directories exist on mounted volume
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ lookup('env', 'PUID') }}"
        group: "{{ lookup('env', 'PGID') }}"
        mode: '0755'
      loop:
        - /data/desktop
        - /data/desktop/config
        - /data/desktop/config/xfce4
        - /data/desktop/config/xfce4/xfconf
        - /data/desktop/config/xfce4/xfconf/xfce-perchannel-xml

    # -------------------------------------------------------------------------
    # XFCE THEME CONFIGURATION
    # -------------------------------------------------------------------------
    # These XML files are written at startup (not build time) because /data
    # is a volume mount unavailable during build. Writing them here ensures
    # the correct theme is applied on every container start, regardless of
    # what XFCE may have written to the USB during a previous session.
    #
    # xfconfd reads these files when it starts. xfsettingsd then picks up
    # the values from xfconfd and applies them to all running GTK apps.
    # -------------------------------------------------------------------------

    - name: Write xsettings.xml — GTK theme, icons, fonts
      # xsettings controls GTK-wide appearance: theme, icon set, cursor,
      # and font names. xfsettingsd broadcasts these to all GTK apps.
      copy:
        dest: /data/desktop/config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml
        owner: "{{ lookup('env', 'PUID') }}"
        group: "{{ lookup('env', 'PGID') }}"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <!-- GTK widget theme: Materia-dark-compact for a modern dark UI -->
              <property name="ThemeName" type="string" value="Materia-dark-compact"/>
              <!-- Icon theme: Papirus-Dark matches the dark theme palette -->
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <!-- Adwaita cursor: clean, available without extra packages -->
              <property name="CursorThemeName" type="string" value="Adwaita"/>
              <!-- UI font: Noto Sans for consistent cross-script rendering -->
              <property name="FontName" type="string" value="Noto Sans 10"/>
              <!-- Monospace font: used in terminals and code editors -->
              <property name="MonospaceFontName" type="string" value="Noto Sans Mono 10"/>
            </property>
          </channel>

    - name: Write xfwm4.xml — window manager theme and behaviour
      # xfwm4 controls window decoration style, title bar font, button
      # layout, and compositor. Compositor is disabled to avoid rendering
      # artifacts inside the Xephyr nested display.
      copy:
        dest: /data/desktop/config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
        owner: "{{ lookup('env', 'PUID') }}"
        group: "{{ lookup('env', 'PGID') }}"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <!-- Window decoration theme — must match an installed xfwm4 theme -->
              <property name="theme" type="string" value="Materia-dark-compact"/>
              <!-- Title bar font -->
              <property name="title_font" type="string" value="Noto Sans Bold 10"/>
              <!-- Button layout: O=menu | H=hide M=maximise C=close -->
              <property name="button_layout" type="string" value="O|HMC"/>
              <!-- Compositor disabled: avoids rendering artifacts inside Xephyr -->
              <property name="compositor_enabled" type="bool" value="false"/>
            </property>
          </channel>

    - name: Write xfce4-desktop.xml — desktop icon style
      # style=0 disables desktop icons for a cleaner look.
      # Users interact with files via Thunar rather than desktop icons.
      copy:
        dest: /data/desktop/config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml
        owner: "{{ lookup('env', 'PUID') }}"
        group: "{{ lookup('env', 'PGID') }}"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="desktop-icons" type="empty">
              <!-- 0 = no desktop icons, 1 = file icons, 2 = minimised app icons -->
              <property name="style" type="int" value="0"/>
            </property>
          </channel>