services:
  main:
    build: 
      context: .
      args:
        - PUID=${PUID:?err}
        - PGID=${PGID:?err}
    image: researcher-deskless:${VERSION:?err}
    container_name: researcher-deskless
    environment:
      - DISPLAY=${DISPLAY:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - PULSE_SERVER=unix:/run/user/${PUID:?err}/pulse/native
      - HOST_DISPLAY=${HOST_DISPLAY:?err}
      - HOST_XAUTHORITY=${HOST_XAUTHORITY:?err}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      # - ./data/home:/home/researcher
      - /run/user/${HOST_UID:?err}/pulse:/run/user/${PUID:?err}/pulse

    network_mode: host
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    restart: "no"