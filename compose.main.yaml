services:
  main:
    build: 
      context: .
      args:
        - PUID=${PUID:?err}
        - PGID=${PGID:?err}
    image: researcher-deskless:${VERSION:?err}
    container_name: researcher-deskless
    environment:
      - DISPLAY=${DISPLAY:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      # - ./data/home:/home/researcher
    network_mode: host
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    restart: "no"